# config/brains/brains.yaml
#
# WHY USE YAML INSTEAD OF .BAT FOR CONFIG?
# -----------------------------------------
# .bat files mix configuration (what model to load, what flags to use) with
# shell logic (error checks, echo statements, exit codes).  That makes it
# hard to read config at a glance or validate it programmatically.
#
# YAML lets you:
#   - See every parameter in one clean, human-readable file
#   - Add comments explaining each flag (like this one)
#   - Load config in Python with one line: yaml.safe_load(open(...))
#   - Validate types and required keys before launching any process
#   - Share config across scripts without copy-pasting .bat snippets
#
# HOW THIS RELATES TO THE .BAT FILES
# ------------------------------------
# The .bat files (start_q5_server.bat, etc.) remain the actual launch scripts
# because server_manager.py reads them directly today.  This YAML file is the
# DOCUMENTED, HUMAN-READABLE version of the same config — a migration target.
# Eventually server_manager.py can read this file instead of parsing .bat files.
#
# HOW TO READ THIS FILE
# ----------------------
# Each brain has:
#   - exe:    path to llama-server.exe  (replaces SET EXE= in .bat)
#   - model:  path to the GGUF file     (replaces SET MODEL= in .bat)
#   - log:    path to the log file      (replaces SET LOGFILE= in .bat)
#   - server: all llama-server CLI flags grouped by category

# -----------------------------------------------------------------------------
# FAST Brain — Qwen2.5-14B Q6_K — port 8011
# GPU: RTX 5080 (CUDA1, 16 GB VRAM)
# -----------------------------------------------------------------------------
fast:
  exe: "F:/Projects/sage_kaizen_ai/llama.cpp/build/bin/Release/llama-server.exe"
  model: "E:/Qwen2.5-14B-Instruct-GGUF/Q6_K/qwen2.5-14b-instruct-q6_k-00001-of-00004.gguf"
  log: "F:/Projects/sage_kaizen_ai/logs/q5_server.log"
  startup_timeout_s: 300 # 5 minutes #1800    # 30 minutes — 14B model cold load on 5080

  server:
    # Network — which address and port to listen on
    host: "127.0.0.1"       # localhost only; never expose to the network
    port: 8011               # FAST brain lives on 8011

    # Identity — shown in /v1/models and logs
    alias: "Qwen2.5-14B-Q6_K"

    # GPU assignment
    # CUDA0 = RTX 5090 (32 GB), CUDA1 = RTX 5080 (16 GB)
    # The 14B model fits comfortably on the 5080.
    device: "CUDA1"
    n_gpu_layers: "all"      # offload every layer to GPU
    split_mode: "none"       # single-GPU; no tensor split needed

    # Context & batching
    ctx_size: 16384 # 8192            # token context window
    batch_size: 384 # 1024          # max tokens processed in one forward pass (prompt)
    ubatch_size: 128 # 512          # micro-batch size for batched decoding

    # CPU threads
    # Rule of thumb: threads ~ physical cores available to this process
    threads: 10
    threads_batch: 10
    threads_http: 6           # HTTP worker threads (handles concurrent requests)

    # “single request” slot behavior (lower overhead)
    parallel: 1
    no_kv_unified: true
    no_cont_batching: true

    # Precision & performance
    flash_attn: true          # Flash Attention 2 — reduces VRAM, speeds up long contexts
    cache_type_k: "f16"       # KV cache key dtype (f16 = good balance)
    cache_type_v: "q8_0" # "f16"       # KV cache value dtype

    # Context fitting — auto-reduces ctx_size to fit in VRAM if needed
    fit: true
    fit_ctx: 16384
    fit_target: 512           # target free VRAM (MB) to leave after loading

    # Generation defaults (can be overridden per-request)
    no_warmup: true           # skip warmup prompt on startup (faster cold start) whether to perform warmup with an empty run (default: enabled)
    n_predict: 256            # default max tokens to generate if not specified

    # Logging — these flags are critical per the project invariants
    log_colors: false         # no ANSI color codes in log file
    log_timestamps: true      # prepend timestamp to every log line
    log_prefix: true          # prepend log level prefix
    log_verbosity: 3          # 0=error 1=warn 2=info 3=debug


# -----------------------------------------------------------------------------
# ARCHITECT Brain — Qwen2.5-32B Q6_K_L — port 8012
# GPU: RTX 5090 (CUDA0, 32 GB VRAM)
# -----------------------------------------------------------------------------
architect:
  exe: "F:/Projects/sage_kaizen_ai/llama.cpp/build/bin/Release/llama-server.exe"
  model: "E:/Qwen3-32B-GGUF/Qwen3-32B-Q6_K.gguf"
  log: "F:/Projects/sage_kaizen_ai/logs/q6_server.log"
  startup_timeout_s: 300 # 5 minutes  # 2700    # 45 minutes — 32B model cold load on 5090

  server:
    host: "127.0.0.1"
    port: 8012               # ARCHITECT brain lives on 8012

    alias: "Qwen3-32B-Q6_K"

    # The 32B model needs the larger GPU
    device: "CUDA0"
    n_gpu_layers: "all"
    split_mode: "none"

    # Larger context for deep reasoning tasks
    ctx_size: 12288  # 12288 (12K)  # 8192
    batch_size: 384 # 768           # smaller batch than FAST — 32B has higher per-token cost
    ubatch_size: 128 # 192 # 256

    # More threads for the heavier model
    threads: 22
    threads_batch: 22
    threads_http: 8

    parallel: 1

    # With parallel=1 (single slot) there is no benefit to a unified KV buffer
    # shared across sequences.  Disabling it reduces internal bookkeeping and
    # avoids any unified-buffer edge cases with quantized KV caches.
    no_kv_unified: true

    # Continuous batching (dynamic batching) is only useful when more than one
    # sequence runs in parallel.  With parallel=1 it adds overhead with no gain.
    no_cont_batching: true

    flash_attn: true
    cache_type_k: "q8_0"  # "f16" # key (K) cache
    cache_type_v: "q8_0"     # quantized value (V) cache — saves VRAM on the larger model

    fit: true
    fit_target: 1024          # leave more headroom on the 32 GB card
    fit_ctx: 12288 # 8192

    no_warmup: true
    n_predict: 512            # ARCHITECT generates longer responses by default

    log_colors: false
    log_timestamps: true
    log_prefix: true
    log_verbosity: 3


# -----------------------------------------------------------------------------
# Embedding Server — BGE-M3 FP16 — port 8020
# GPU: RTX 5090 (CUDA0, 32 GB VRAM)
# Shares CUDA0 with ARCHITECT; starts first and stays resident
# -----------------------------------------------------------------------------
embed:
  exe: "F:/Projects/sage_kaizen_ai/llama.cpp/build/bin/Release/llama-server.exe"
  model: "E:/bge-m3-GGUF/FP16/bge-m3-FP16.gguf"
  log: "F:/Projects/sage_kaizen_ai/logs/embed_server.log"
  startup_timeout_s: 300     # 5 minutes — BGE-M3 FP16 loads fast

  server:
    host: "127.0.0.1"
    port: 8020

    alias: "bge-m3-embed"

    # Embedding-specific flags
    embeddings: true          # enable the /embeddings endpoint
    pooling: "mean"           # mean pooling over token embeddings (BGE-M3 standard)
    use_fp16: true            # Explicit use_fp16=True flag in the official API for faster inference with slight quality drop

    device: "CUDA0"
    n_gpu_layers: "all"

    # BGE-M3 produces 1024-dimensional embeddings.
    # ctx_size should match your ingest chunk size (rag_v1 default: 1200 chars ~ 300 tokens)
    ctx_size: 2048
    batch_size: 2048          # large batch — embedding is cheap per token vs generation
    ubatch_size: 512

    threads: 20
    threads_batch: 20
    threads_http: 8

    flash_attn: true

    log_colors: false
    log_timestamps: true
    log_prefix: true
    log_verbosity: 3
