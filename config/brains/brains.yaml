# config/brains/brains.yaml
#
# Single authoritative configuration source for all llama-server instances.
# server_manager.py reads this file directly — no .bat files.
#
# Each brain entry has:
#   - exe:    path to llama-server.exe
#   - model:  path to the GGUF file
#   - log:    path to the log file (--log-file; never stdout/stderr redirect)
#   - server: all llama-server CLI flags grouped by category

# -----------------------------------------------------------------------------
# FAST Brain — Qwen2.5-Omni-7B Q8_0 — port 8011
# GPU: RTX 5080 (CUDA1, 16 GB VRAM)
#
# Replaces the former Qwen2.5-14B Q6_K.
# Qwen2.5-Omni supports text, image, and audio input via the --mmproj file.
#
# VRAM budget on CUDA1 (16 GB):
#   Model weights Q8_0:        ~8.10 GB
#   mmproj encoder F16:        ~2.64 GB
#   KV cache q8_0 @ ctx=16384: ~0.45 GB  (28 layers, 4 KV heads, head_dim=128)
#   Compute buffer:            ~0.50 GB
#   Total:                    ~11.7 GB  → ~4.3 GB headroom  ✓
#
# ARCHITECT (Qwen3.5-27B) on CUDA0 runs simultaneously — no GPU conflict.
# Audio output (TTS) is NOT supported by llama.cpp; responses are text-only.
# Video input: client-side frame extraction → sent as individual images.
# -----------------------------------------------------------------------------
fast:
  exe: "F:/Projects/sage_kaizen_ai/llama.cpp/build/bin/Release/llama-server.exe"
  model: "E:/Qwen2.5-Omni-7B-GGUF/Qwen2.5-Omni-7B-Q8_0.gguf"
  log: "F:/Projects/sage_kaizen_ai/logs/q5_server.log"
  startup_timeout_s: 300    # 5 minutes — 7B model loads quickly on CUDA1

  server:
    host: "127.0.0.1"
    port: 8011

    alias: "Qwen2.5-Omni-7B-Q8_0"

    device: "CUDA1"
    n_gpu_layers: "all"
    split_mode: "none"

    # Combined audio+vision encoder.  Single GGUF holds both the Whisper-style
    # conformer (audio) and the vision transformer (images), identified by the
    # KEY_HAS_AUDIO_ENC and KEY_HAS_VISION_ENC metadata flags.
    # Run install_huggingface.py with the *mmproj*F16* pattern to download it.
    mmproj: "E:/Qwen2.5-Omni-7B-GGUF/mmproj-F16.gguf"

    # 16K context: 1 image ≈ 1280 tokens, leaving 15104 for conversation.
    ctx_size: 16384
    batch_size: 2048          # larger batch improves image-token prefill speed
    ubatch_size: 1024         # 1024 halves GPU kernel dispatch rounds vs 512 during RAG prefill

    threads: 10
    threads_batch: 10
    threads_http: 6

    parallel: 1
    no_kv_unified: true
    no_cont_batching: true

    flash_attn: true
    cache_type_k: "q8_0"
    cache_type_v: "q8_0"

    fit: true
    fit_ctx: 16384
    fit_target: 512

    no_warmup: true
    n_predict: -1             # unlimited — multimodal responses vary widely in length

    log_colors: false
    log_timestamps: true
    log_prefix: true
    log_verbosity: 3


# -----------------------------------------------------------------------------
# ARCHITECT Brain — Qwen3.5-27B-Uncensored-HauhauCS-Aggressive Q6_K — port 8012
# GPU: RTX 5090 (CUDA0, 32 GB VRAM)
#
# Architecture: Hybrid Gated DeltaNet linear attention + full softmax attention
#   - 64 layers total; 16 use KV cache (softmax attention), 48 use fixed recurrent state
#   - KV cache VRAM cost is ~75% lower than a pure-Transformer model of the same size
#   - Natively multimodal (text + image + video) via mmproj vision encoder
#   - 262K native context; model card recommends >= 128K for thinking mode
#
# VRAM budget on CUDA0 (32 GB):
#   Model weights Q6_K:        ~21.0 GB
#   mmproj encoder F16:         ~0.9 GB  (885 MB vision encoder, when enabled)
#   KV cache q8_0 @ ctx=131072:~4.0 GB  (16 KV layers, 32 heads, head_dim=128)
#   Compute buffer:             ~1.5 GB
#   Total w/ mmproj:           ~27.4 GB  → ~4.6 GB headroom  ✓
#
# Multimodal setup (optional — requires downloading vision encoder):
#   huggingface-cli download HauhauCS/Qwen3.5-27B-Uncensored-HauhauCS-Aggressive \
#     --include "mmproj-Qwen3.5-27B-Uncensored-HauhauCS-Aggressive-f16.gguf" \
#     --local-dir E:/Qwen3.5-27B-Uncensored-HauhauCS-Aggressive
#   Then uncomment the mmproj line below.
# -----------------------------------------------------------------------------
architect:
  exe: "F:/Projects/sage_kaizen_ai/llama.cpp/build/bin/Release/llama-server.exe"
  model: "E:/Qwen3.5-27B-Uncensored-HauhauCS-Aggressive/Qwen3.5-27B-Uncensored-HauhauCS-Aggressive-Q6_K.gguf"
  log: "F:/Projects/sage_kaizen_ai/logs/q6_server.log"
  startup_timeout_s: 360    # 6 minutes — 27B model loads; allow extra for mmproj if enabled

  server:
    host: "127.0.0.1"
    port: 8012               # ARCHITECT brain lives on 8012

    alias: "Qwen3.5-27B-Q6_K"

    # The 27B model runs on the larger GPU
    device: "CUDA0"
    n_gpu_layers: "all"
    split_mode: "none"

    # Multimodal vision encoder — uncomment after downloading mmproj file (see header above).
    # Enables image and video input on the ARCHITECT brain alongside text reasoning.
    mmproj: "E:/Qwen3.5-27B-Uncensored-HauhauCS-Aggressive/mmproj-Qwen3.5-27B-Uncensored-HauhauCS-Aggressive-f16.gguf"

    # Context — model trained to 262K; model card requires >= 128K for thinking mode.
    # Only 16/64 layers use KV cache; at 128K q8_0 KV costs ~4 GB (5090 has ~4.6 GB headroom).
    ctx_size: 131072          # 128K — meets model thinking-mode requirement
    batch_size: 2048          # logical batch (llama.cpp default); better prefill throughput
    ubatch_size: 1024         # 1024 halves GPU kernel dispatch rounds vs 512 during RAG prefill

    # More threads for the heavier model
    threads: 22
    threads_batch: 22
    threads_http: 8

    parallel: 1

    # With parallel=1 (single slot) there is no benefit to a unified KV buffer
    # shared across sequences.  Disabling it reduces internal bookkeeping and
    # avoids any unified-buffer edge cases with quantized KV caches.
    no_kv_unified: true

    # Continuous batching (dynamic batching) is only useful when more than one
    # sequence runs in parallel.  With parallel=1 it adds overhead with no gain.
    no_cont_batching: true

    flash_attn: true
    cache_type_k: "q8_0"     # near-lossless; halves KV memory vs f16
    cache_type_v: "q8_0"     # only 16/64 layers use KV — pressure to go lower is minimal

    # SWA full cache — Qwen3.5-27B's 16 softmax-attention layers use sliding window attention.
    # Without this flag llama.cpp may use a smaller rolling window, silently losing context
    # beyond the SWA window.  Enabling full-size SWA cache preserves coherence across the
    # full 128K context at the cost of the KV VRAM already budgeted above.
    swa_full: true

    # KV cache reuse via prefix shifting — big latency win for RAG-heavy turns.
    # The system prompt + injected RAG/wiki/search context is an identical prefix
    # shared across most turns.  With cache_reuse=256, llama-server attempts to
    # shift and reuse at least 256 cached tokens rather than re-prefilling from scratch.
    cache_reuse: 256

    # Raise server process priority so ARCHITECT turns are not preempted by background tasks.
    prio: 2                   # high (0=normal, 1=medium, 2=high, 3=realtime)

    fit: true
    fit_target: 3072          # 3 GB buffer; extra headroom for 128K ctx + optional mmproj
    fit_ctx: 131072

    no_warmup: true
    n_predict: -1             # unlimited — thinking mode can generate thousands of tokens;
                              # model stops via EOS; clients should set their own max_tokens

    # Thinking mode — Qwen3.5-27B-Uncensored always runs with <think> enabled on ARCHITECT.
    # Non-thinking fast responses are routed to the FAST brain (Qwen2.5-Omni-7B) by router.py.
    # Model card recommended sampling (thinking mode): temp=0.6, top_k=20, top_p=0.95.
    reasoning: "on"           # explicit thinking mode (--reasoning on); b8639+ flag
    reasoning_budget: -1      # unrestricted thinking depth (--reasoning-budget -1)
    reasoning_format: "deepseek"  # routes <think> tokens to reasoning_content in API
                                  # response, keeping the content field clean for the UI
    # --reasoning-budget-message: only fires when reasoning_budget > 0 (finite).
    # With reasoning_budget=-1 (unlimited) this flag has no effect.
    # Example for a capped-budget setup:
    #   reasoning_budget: 8000
    #   reasoning_budget_message: "Wrap up reasoning and provide the answer."

    # ── Speculative decoding (draftless n-gram) ───────────────────────────────
    # ngram-map-k: builds a frequency hash-map of n-gram patterns seen in the
    # current context and uses them as draft tokens.  No separate model needed.
    # Expected: ~70% draft acceptance → ~1.7x effective generation throughput.
    #
    # IMPORTANT: DO NOT use ngram-mod with Qwen3.5 hybrid models.
    # Issues #19232 and #19267 document crashes and hangs with hybrid attention
    # architectures.  ngram-map-k is stable and preferred.
    #
    # Minor q8_0 KV compat note: ~5% overhead vs f16 KV — acceptable tradeoff
    # for the 2x VRAM saving and near-zero quality loss of q8_0.
    spec_type: "ngram-map-k"
    spec_ngram_size_n: 5      # 5-token lookup patterns — sweet spot for reasoning chains
    draft_max: 48             # propose up to 48 draft tokens per step
    draft_min: 16             # always propose at least 16 (avoids tiny unproductive batches)

    # ── Prefill checkpoints ───────────────────────────────────────────────────
    # Creates a KV-state snapshot every 4096 tokens during the initial RAG prompt
    # injection (prefill phase).  For a 4–16K RAG prefix this creates 1–4
    # checkpoints; subsequent turns whose prefix matches a checkpoint avoid full
    # reprocessing.  Works correctly alongside swa_full: true.
    #
    # Issue #20225 note: without swa_full, Qwen3.5 hybrid models invalidate
    # checkpoints on every turn (causing full reprocessing).  swa_full: true
    # (already set above) is the correct fix; checkpoint_every_n_tokens then
    # resumes working as intended.
    checkpoint_every_n_tokens: 4096

    log_colors: false
    log_timestamps: true
    log_prefix: true
    log_verbosity: 3


# -----------------------------------------------------------------------------
# Embedding Server — BGE-M3 FP16 — port 8020
# GPU: RTX 5090 (CUDA0, 32 GB VRAM)
# Shares CUDA0 with ARCHITECT; starts first and stays resident
# -----------------------------------------------------------------------------
embed:
  exe: "F:/Projects/sage_kaizen_ai/llama.cpp/build/bin/Release/llama-server.exe"
  model: "E:/bge-m3-GGUF/FP16/bge-m3-FP16.gguf"
  log: "F:/Projects/sage_kaizen_ai/logs/embed_server.log"
  startup_timeout_s: 300     # 5 minutes — BGE-M3 FP16 loads fast

  server:
    host: "127.0.0.1"
    port: 8020

    alias: "bge-m3-embed"

    # Embedding-specific flags
    embeddings: true          # enable the /embeddings endpoint
    pooling: "mean"           # mean pooling over token embeddings (BGE-M3 standard)

    device: "CUDA0"
    n_gpu_layers: "all"

    # BGE-M3 produces 1024-dimensional embeddings.
    # ctx_size should match your ingest chunk size (rag_v1 default: 1200 chars ~ 300 tokens)
    ctx_size: 2048
    batch_size: 2048          # large batch — embedding is cheap per token vs generation
    ubatch_size: 512

    threads: 20
    threads_batch: 20
    threads_http: 8

    flash_attn: true

    log_colors: false
    log_timestamps: true
    log_prefix: true
    log_verbosity: 3


# -----------------------------------------------------------------------------
# Wiki Multimodal Embed — jinaai/jina-clip-v2 — port 8031
# GPU: RTX 5090 (CUDA0, 32 GB VRAM)
# Used by both mm_embed_service/app.py (FastAPI) and wiki_ingest.py (batch job)
# -----------------------------------------------------------------------------
wiki_embed:
  # Local directory containing the jina-clip-v2 model weights
  model: "E:/jinaai_jina-clip-v2"

  # Shared log file — wiki_ingest.py Python logger AND the embed service
  # subprocess both append here (one unified pipeline log)
  log: "F:/Projects/sage_kaizen_ai/logs/sage_wiki_embed.log"

  # How long wiki_ingest.py waits for app.py to become healthy on startup.
  # jina-clip-v2 on GPU loads in ~30-90 s; 300 s gives plenty of headroom.
  startup_timeout_s: 300

  # ── Embed service settings (read by app.py / FastAPI) ──────────────────
  service:
    host: "127.0.0.1"
    port: 8031

    # PyTorch device for the model (CUDA0 = RTX 5090)
    device: "cuda:0"

    # Maximum batch sizes enforced by the service endpoints.
    # wiki_ingest.py uses the same values as its per-call batch size so that
    # ingest calls always stay within the service limits.
    text_batch: 256
    image_batch: 64

  # ── Verbosity (env var, not a service param) ────────────────────────────
  # WIKI_EMBED_VERBOSE controls how much the embed service writes to its log.
  #
  # Default (0 / unset): quiet mode — only lifecycle milestones are logged
  #   (loading, compiling, warmup, ready, errors).  Suppresses:
  #     - transformers weight-loading progress bars (tqdm)
  #     - flash-attn / xFormers / torch_dtype deprecation warnings
  #     - uvicorn per-request access logs (POST /embed/text 200 OK)
  #
  # Set WIKI_EMBED_VERBOSE=1 to restore full output for debugging:
  #   - All transformers weight-loading progress bars
  #   - All Python warnings
  #   - uvicorn access logs on every request
  #
  # wiki_ingest.py defaults to verbose=1 (progress bars are useful for
  # monitoring long batch ingest jobs).
  # wiki_retriever.py (runtime) defaults to verbose=0.

  # ── Ingest job settings (read by wiki_ingest.py) ───────────────────────
  ingest:
    # Root directory of the extracted Wikipedia ZIM dump (from zim_dump.py)
    root: "H:/llm_wiki_data/wikipedia_maxi_2025_08"

    # Text chunking parameters
    chunk_chars: 1200   # target chunk size in characters
    overlap: 200        # overlap between consecutive chunks

    # Heading names to exclude from chunking (exact match, case-sensitive)
    exclude_sections: "References,External links,Further reading,Authority control"

    # Progress logging: emit a stats line every N pages
    log_every_pages: 10000


# -----------------------------------------------------------------------------
# Cross-Modal Embed — CLIP + CLAP — dual-modal pipeline
#
# Images → jinaai/jina-clip-v2 (port 8031, reuses wiki embed service)
#            1024-dim cosine vectors → image_embeddings table
#
# Audio  → laion/clap-htsat-unfused (port 8040, CLAP embed service)
#            512-dim cosine vectors → audio_embeddings table
#
# The wiki embed service (port 8031) must be running before image ingest.
# The CLAP service (port 8040) is auto-started by media_ingest.py if needed.
#
# CLAP model: already downloaded to E:/clap-htsat-unfused (local_files_only).
# No HuggingFace download required at service start.
#
# GPU assignment (ARCHITECT brain always on CUDA0/5090):
#   CUDA0 (RTX 5090) — wiki embed service (jina-clip-v2) + ARCHITECT brain
#   CUDA1 (RTX 5080) — CLAP embed service (audio, freed when FAST brain off)
# -----------------------------------------------------------------------------
# -----------------------------------------------------------------------------
# Live Web Search — SearXNG private instance
# Running at http://localhost:8080 via Docker Desktop
#
# Router sets needs_search=True on turns that require live data.
# SearchOrchestrator fetches from SearXNG, filters/ranks results, then
# Summarizer calls the FAST brain for a lightweight condensed pass before
# the evidence is injected as a <search_context> block.
#
# All values here are documentation; the live defaults are env-var driven
# (SAGE_SEARCH_* — see search/search_orchestrator.py and search/searxng_client.py).
# Override via .env or shell environment to change at runtime without editing YAML.
# -----------------------------------------------------------------------------
search:
  # Base URL of the private SearXNG Docker instance
  searxng_url: "http://localhost:8080"

  # Per-request HTTP timeout (seconds) — SearXNG fans out to multiple engines
  timeout_seconds: 8

  # Result ceiling per brain — ARCHITECT gets more context headroom (64K ctx)
  max_results:
    fast: 6
    architect: 12

  # Minimum SearXNG score to keep a result.
  # 0.0 = no filter (safe default: SearXNG returns 0.0 for some valid engines).
  min_score: 0.0

  # Snippet truncation — balances context quality vs. token budget.
  snippet_max_chars: 300

  # Default time_range for news-category queries.
  # Accepted values: day | week | month | year | (omit for all-time)
  news_time_range: "week"

  # SearXNG categories used per intent (for documentation; inferred at runtime)
  default_categories:
    - general
    - news
  category_map:
    news:       [news, headlines, breaking, politics, election, current events]
    science:    [arxiv, research paper, scientific study, journal article, nasa discovery]
    technology: [tech news, software release, github release, hardware release, ai news]


media_embed:
  # Local path to the downloaded laion/clap-htsat-unfused model weights.
  # Download: huggingface-cli download laion/clap-htsat-unfused --local-dir E:/clap-htsat-unfused
  clap_model_dir: "E:/clap-htsat-unfused"

  log: "F:/Projects/sage_kaizen_ai/logs/clap_embed_service.log"
  startup_timeout_s: 300    # model load + torch.compile JIT + warmup = ~150-200 s on CUDA1

  # Image embedding — delegates to the always-running wiki embed service.
  image_service:
    host: "127.0.0.1"
    port: 8031              # wiki embed service (jinaai/jina-clip-v2, 1024-dim)
    image_batch: 32         # images per /embed/image call

  # Audio embedding — dedicated CLAP service.
  audio_service:
    host: "127.0.0.1"
    port: 8040              # CLAP embed service (laion/clap-htsat-unfused, 512-dim)
    device: "cuda:1"        # RTX 5080; override via CLAP_DEVICE env var
    audio_batch: 32         # audio files per /embed/audio call
