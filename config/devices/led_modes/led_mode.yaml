## 6.3 Documentation Generator

Purpose:
- Scan repo
- Generate README
- Generate Mermaid diagrams
- Reflect architecture updates

Must not:
- Rewrite architecture automatically
- Modify business logic

---

# 7. Cross-Cutting Concerns

## Observability
- Logs are authoritative
- Startup readiness determined by explicit log markers
- No silent failures

## Typing
- Python typing required
- Pylance must remain clean

## Windows Compatibility
- cmd.exe syntax
- ^ line continuations
- Proper quoting

